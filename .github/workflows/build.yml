name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip git unzip openjdk-17-jdk build-essential libssl-dev libffi-dev python3-dev libtool automake autoconf libltdl-dev pkg-config m4
        # Проверяем, что git установлен
        git --version
        # Проверяем установку autotools
        autoconf --version || echo "autoconf не найден"
        automake --version || echo "automake не найден"
        libtool --version || echo "libtool не найден"
        # Проверяем установку дополнительных пакетов
        pkg-config --version || echo "pkg-config не найден"
        m4 --version || echo "m4 не найден"
        # Проверяем наличие макросов libtool
        if [ -d "/usr/share/aclocal" ]; then
          echo "Макросы aclocal найдены в /usr/share/aclocal"
          ls /usr/share/aclocal/*.m4 2>/dev/null | head -5 || echo "Файлы .m4 не найдены"
        fi
    
    - name: Install Python dependencies
      run: |
        pip3 install --user buildozer cython
        # Также устанавливаем cython системно для buildozer (использует системный Python)
        sudo pip3 install cython || pip3 install --break-system-packages cython || echo "Попытка установить cython системно не удалась, продолжаем..."
        export PATH="$HOME/.local/bin:$PATH"
        # Проверяем, что buildozer установлен
        buildozer --version
        # Проверяем, что cython доступен для системного Python
        python3 -c "import cython; print(f'Cython версия: {cython.__version__}')" || echo "ПРЕДУПРЕЖДЕНИЕ: Cython не доступен для системного Python"
    
    - name: Initialize Buildozer and Android SDK
      working-directory: ./ready_app
      run: |
        export PATH="$HOME/.local/bin:/usr/bin:/usr/local/bin:$PATH"
        # Проверяем наличие git
        which git || (echo "Git not found!" && exit 1)
        git --version
        
        # Сначала создаем структуру SDK и принимаем лицензии
        SDK_PATH="$HOME/.buildozer/android/platform/android-sdk"
        mkdir -p "$SDK_PATH/licenses"
        
        # Принимаем все лицензии автоматически (до установки SDK)
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$SDK_PATH/licenses/android-sdk-license"
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$SDK_PATH/licenses/android-sdk-preview-license"
        echo "8403addf88ab4874007e1c1e80a0025de2550a16" > "$SDK_PATH/licenses/android-googletv-license"
        echo "601085b94cd77f0b54ff86406957099ebe79c4d6" > "$SDK_PATH/licenses/android-sdk-arm-dbt-license"
        echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > "$SDK_PATH/licenses/google-gdk-license"
        echo "d975f751698a77b662f1254ddbeed3901e976f5a" > "$SDK_PATH/licenses/intel-android-extra-license"
        echo "e9acab5e5f1efb7a6c54c6850d6c4c78afd05907" > "$SDK_PATH/licenses/mips-android-sysimage-license"
        echo "d56f5187479452e8b6f6e7e3c4c8b1c2d3e4f5a6b" > "$SDK_PATH/licenses/android-sdk-license-5"
        echo "601991b4f3c23035e0c25ecdbb92b3d1c4e5f6a7b" > "$SDK_PATH/licenses/android-sdk-license-6"
        
        # Инициализируем buildozer (скачает Android SDK автоматически)
        # Это скачает базовый SDK, но может не установить cmdline-tools
        buildozer android update || echo "Buildozer update завершился с предупреждениями, продолжаем..."
        
        # Если SDK уже существует, устанавливаем cmdline-tools вручную
        if [ -d "$SDK_PATH" ] && [ ! -d "$SDK_PATH/cmdline-tools/latest" ]; then
          echo "Устанавливаем cmdline-tools вручную..."
          cd /tmp
          # Пробуем скачать разные версии cmdline-tools
          if ! wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip && \
             ! wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip; then
            echo "Не удалось скачать cmdline-tools"
            exit 1
          fi
          
          if [ -f commandlinetools-*.zip ]; then
            # Распаковываем во временную папку
            TEMP_DIR=$(mktemp -d)
            unzip -q commandlinetools-*.zip -d "$TEMP_DIR"
            
            # Создаем правильную структуру
            mkdir -p "$SDK_PATH/cmdline-tools/latest"
            
            # Перемещаем содержимое распакованной папки в cmdline-tools/latest
            # Распакованный архив содержит папку cmdline-tools с bin, lib и т.д.
            if [ -d "$TEMP_DIR/cmdline-tools" ]; then
              mv "$TEMP_DIR/cmdline-tools"/* "$SDK_PATH/cmdline-tools/latest/" 2>/dev/null || true
            else
              # Если структура другая, перемещаем все содержимое
              mv "$TEMP_DIR"/* "$SDK_PATH/cmdline-tools/latest/" 2>/dev/null || true
            fi
            
            # Очистка
            rm -rf "$TEMP_DIR"
            rm -f commandlinetools-*.zip
            
            echo "cmdline-tools установлены в $SDK_PATH/cmdline-tools/latest"
            ls -la "$SDK_PATH/cmdline-tools/latest/bin" || echo "Проверка содержимого cmdline-tools"
          fi
        fi
        
        # Исправляем путь к sdkmanager для buildozer
        # Buildozer ищет sdkmanager в tools/bin/, но в новых версиях он в cmdline-tools/latest/bin/
        if [ -d "$SDK_PATH" ]; then
          # Создаем структуру tools/bin если её нет
          mkdir -p "$SDK_PATH/tools/bin"
          
          # Проверяем наличие cmdline-tools и создаем симлинк
          if [ -f "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "Найден sdkmanager в cmdline-tools, создаем симлинк..."
            ln -sf "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" "$SDK_PATH/tools/bin/sdkmanager"
            ln -sf "$SDK_PATH/cmdline-tools/latest/bin/avdmanager" "$SDK_PATH/tools/bin/avdmanager" || true
            # Копируем также другие инструменты
            if [ -d "$SDK_PATH/cmdline-tools/latest/lib" ]; then
              cp -r "$SDK_PATH/cmdline-tools/latest/lib" "$SDK_PATH/tools/" 2>/dev/null || true
            fi
            echo "Симлинк создан: $SDK_PATH/tools/bin/sdkmanager -> $SDK_PATH/cmdline-tools/latest/bin/sdkmanager"
          elif [ -d "$SDK_PATH/cmdline-tools-tmp" ]; then
            # Если осталась старая структура, исправляем её
            echo "Исправляем структуру cmdline-tools..."
            mkdir -p "$SDK_PATH/cmdline-tools/latest"
            mv "$SDK_PATH/cmdline-tools-tmp"/* "$SDK_PATH/cmdline-tools/latest/" 2>/dev/null || true
            rmdir "$SDK_PATH/cmdline-tools-tmp" 2>/dev/null || true
            if [ -f "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" ]; then
              ln -sf "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" "$SDK_PATH/tools/bin/sdkmanager"
              echo "Симлинк создан после исправления структуры"
            fi
          fi
          
          # Проверяем, что sdkmanager доступен
          if [ -f "$SDK_PATH/tools/bin/sdkmanager" ]; then
            echo "✓ sdkmanager найден в tools/bin/sdkmanager"
            "$SDK_PATH/tools/bin/sdkmanager" --version || true
          elif [ -f "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "✓ sdkmanager найден в cmdline-tools/latest/bin/sdkmanager"
            "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" --version || true
            # Создаем симлинк, если его еще нет
            ln -sf "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" "$SDK_PATH/tools/bin/sdkmanager"
          else
            echo "ОШИБКА: sdkmanager не найден ни в одном из путей!"
            echo "Содержимое SDK:"
            ls -la "$SDK_PATH" || true
            echo "Содержимое cmdline-tools:"
            ls -la "$SDK_PATH/cmdline-tools" 2>/dev/null || echo "cmdline-tools не существует"
            exit 1
          fi
        fi
        
        # Устанавливаем необходимые компоненты Android SDK
        if [ -d "$SDK_PATH" ]; then
          # Находим sdkmanager (приоритет: tools/bin для buildozer, затем cmdline-tools)
          SDKMANAGER=""
          if [ -f "$SDK_PATH/tools/bin/sdkmanager" ]; then
            SDKMANAGER="$SDK_PATH/tools/bin/sdkmanager"
          elif [ -f "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$SDK_PATH/cmdline-tools/latest/bin/sdkmanager"
          fi
          
          if [ -n "$SDKMANAGER" ]; then
            echo "Найден sdkmanager: $SDKMANAGER"
            
            # Устанавливаем стабильную версию build-tools (не rc)
            # Пробуем установить 34.0.0, если не получится - 33.0.0
            echo "Установка build-tools и платформы android-33..."
            if $SDKMANAGER "build-tools;34.0.0" "platform-tools" "platforms;android-33"; then
              echo "Build-tools 34.0.0 и платформа android-33 установлены"
            elif $SDKMANAGER "build-tools;33.0.0" "platform-tools" "platforms;android-33"; then
              echo "Build-tools 33.0.0 и платформа android-33 установлены"
            elif $SDKMANAGER "build-tools;32.0.0" "platform-tools" "platforms;android-33"; then
              echo "Build-tools 32.0.0 и платформа android-33 установлены"
            else
              echo "ОШИБКА: Не удалось установить build-tools или платформу!"
              exit 1
            fi
            
            # Проверяем, что платформа android-33 установлена
            if [ -d "$SDK_PATH/platforms/android-33" ]; then
              echo "✓ Платформа android-33 установлена"
            else
              echo "ПРЕДУПРЕЖДЕНИЕ: Платформа android-33 не найдена, проверяем доступные:"
              ls -la "$SDK_PATH/platforms/" 2>/dev/null || echo "Папка platforms не существует"
            fi
            
            # Проверяем, что build-tools установлены
            if [ -d "$SDK_PATH/build-tools" ]; then
              echo "Build-tools установлены:"
              ls -la "$SDK_PATH/build-tools"
              # Проверяем наличие AIDL
              BUILD_TOOLS_DIR=$(ls -d "$SDK_PATH/build-tools"/* | head -1)
              if [ -f "$BUILD_TOOLS_DIR/aidl" ]; then
                echo "AIDL найден: $BUILD_TOOLS_DIR/aidl"
              else
                echo "ПРЕДУПРЕЖДЕНИЕ: AIDL не найден в $BUILD_TOOLS_DIR"
              fi
            else
              echo "ОШИБКА: Build-tools не установлены!"
              exit 1
            fi
          else
            echo "ОШИБКА: sdkmanager не найден!"
            exit 1
          fi
        else
          echo "ОШИБКА: Android SDK не найден!"
          exit 1
        fi
    
    - name: Build APK
      working-directory: ./ready_app
      run: |
        export PATH="$HOME/.local/bin:/usr/bin:/usr/local/bin:$PATH"
        
        # Проверяем структуру проекта
        echo "=== Проверка структуры проекта ==="
        pwd
        ls -la
        echo "Файлы в ready_app:"
        find . -type f -name "*.py" -o -name "*.json" -o -name "*.jpg" | head -20
        
        # Проверяем, что все инструменты доступны
        echo "=== Проверка инструментов ==="
        which git && git --version
        which python3 && python3 --version
        which buildozer && buildozer --version
        
        # Проверяем, что build-tools установлены
        SDK_PATH="$HOME/.buildozer/android/platform/android-sdk"
        echo "=== Проверка Android SDK ==="
        if [ -d "$SDK_PATH/build-tools" ]; then
          echo "Build-tools найдены:"
          ls -la "$SDK_PATH/build-tools"
          # Добавляем build-tools в PATH
          BUILD_TOOLS_DIR=$(ls -d "$SDK_PATH/build-tools"/* | head -1)
          export PATH="$BUILD_TOOLS_DIR:$PATH"
          echo "AIDL путь: $BUILD_TOOLS_DIR/aidl"
          [ -f "$BUILD_TOOLS_DIR/aidl" ] && echo "✓ AIDL найден!" || echo "✗ AIDL не найден!"
        else
          echo "ОШИБКА: Build-tools не найдены!"
          exit 1
        fi
        
        # Проверяем buildozer.spec
        echo "=== Проверка buildozer.spec ==="
        cat buildozer.spec
        echo ""
        echo "=== Проверка настроек Android API ==="
        ANDROID_API=$(grep "android.api" buildozer.spec | cut -d'=' -f2 | tr -d ' ')
        echo "Указанный API в buildozer.spec: $ANDROID_API"
        if [ -z "$ANDROID_API" ]; then
          echo "android.api не найден в spec, используем значение по умолчанию"
          ANDROID_API=33
        fi
        echo "Будет использован API: $ANDROID_API"
        # Устанавливаем переменную окружения для buildozer
        export ANDROIDAPI=$ANDROID_API
        echo "ANDROIDAPI установлен в: $ANDROIDAPI"
        echo ""
        echo "=== Проверка доступных платформ Android ==="
        if [ -d "$SDK_PATH/platforms" ]; then
          echo "Установленные платформы:"
          ls -la "$SDK_PATH/platforms/"
          if [ -d "$SDK_PATH/platforms/android-$ANDROID_API" ]; then
            echo "✓ Платформа android-$ANDROID_API найдена"
          else
            echo "✗ Платформа android-$ANDROID_API НЕ найдена!"
            echo "Доступные платформы:"
            ls -d "$SDK_PATH/platforms/android-"* 2>/dev/null | sed 's/.*android-/android-/' || echo "Платформы не найдены"
          fi
        else
          echo "Папка platforms не найдена"
        fi
        
        # Проверяем наличие всех необходимых файлов
        echo "=== Проверка файлов приложения ==="
        [ -f "app.py" ] && echo "✓ app.py найден" || echo "✗ app.py НЕ найден!"
        [ -f "embedded_image.jpg" ] && echo "✓ embedded_image.jpg найден" || echo "✗ embedded_image.jpg НЕ найден!"
        [ -f "config.json" ] && echo "✓ config.json найден" || echo "✗ config.json НЕ найден!"
        
        # Настраиваем переменные для autoconf
        echo "=== Настройка переменных для autoconf ==="
        export ACLOCAL_PATH="/usr/share/aclocal:$ACLOCAL_PATH"
        echo "ACLOCAL_PATH установлен в: $ACLOCAL_PATH"
        # Проверяем доступность макросов libtool
        if command -v aclocal >/dev/null 2>&1; then
          ACLOCAL_DIR=$(aclocal --print-ac-dir 2>/dev/null || echo "/usr/share/aclocal")
          echo "Директория aclocal: $ACLOCAL_DIR"
          if [ -d "$ACLOCAL_DIR" ]; then
            echo "Проверяем наличие макросов libtool:"
            ls "$ACLOCAL_DIR"/lt*.m4 2>/dev/null | head -3 || echo "Макросы libtool не найдены в $ACLOCAL_DIR"
          fi
        else
          echo "aclocal не найден"
        fi
        
        # Собираем APK с подробным логированием
        echo "=== Начало сборки APK ==="
        BUILD_RESULT=0
        buildozer android debug 2>&1 | tee /tmp/buildozer.log || BUILD_RESULT=$?
        
        # Проверяем результат сборки
        echo "=== Результат сборки: код выхода $BUILD_RESULT ==="
        
        # Проверяем лог на наличие ошибок (даже если код выхода 0)
        if grep -qi "failed\|error\|Buildozer failed" /tmp/buildozer.log; then
          echo "=== ОБНАРУЖЕНА ОШИБКА В ЛОГАХ ==="
          BUILD_RESULT=1
        fi
        
        if [ $BUILD_RESULT -ne 0 ]; then
          echo "=== ОШИБКА СБОРКИ ==="
          echo "Последние 100 строк лога:"
          tail -100 /tmp/buildozer.log
          echo "=== Полный лог сохранен в /tmp/buildozer.log ==="
          echo "=== Поиск ключевых слов ошибок ==="
          grep -i "error\|failed\|exception" /tmp/buildozer.log | tail -20 || echo "Ключевые слова не найдены"
        else
          echo "=== Сборка завершена успешно ==="
          echo "Последние 20 строк лога:"
          tail -20 /tmp/buildozer.log
        fi
        
        # Ищем созданный APK файл
        echo "=== Поиск созданного APK ==="
        echo "Текущая директория:"
        pwd
        echo "Поиск APK в текущей директории:"
        find . -name "*.apk" -type f 2>/dev/null | head -10 || echo "APK не найден в текущей директории"
        echo "Поиск APK в .buildozer:"
        find $HOME/.buildozer -name "*.apk" -type f 2>/dev/null | head -10 || echo "APK не найден в .buildozer"
        
        # Проверяем стандартные пути
        if [ -d "bin" ]; then
          echo "=== Содержимое папки bin/ ==="
          ls -lah bin/ || echo "Не удалось прочитать bin/"
          echo "APK файлы в bin/:"
          ls -lah bin/*.apk 2>/dev/null || echo "APK не найден в bin/"
        else
          echo "Папка bin/ не существует"
        fi
        
        # Сохраняем путь к APK в переменную окружения
        APK_FILE=$(find . -name "*.apk" -type f | head -1)
        if [ -z "$APK_FILE" ]; then
          APK_FILE=$(find $HOME/.buildozer -name "*.apk" -type f 2>/dev/null | head -1)
        fi
        
        if [ -n "$APK_FILE" ]; then
          echo "✓ Найден APK: $APK_FILE"
          # Сохраняем абсолютный путь
          APK_ABS_PATH=$(realpath "$APK_FILE" 2>/dev/null || echo "$(pwd)/$APK_FILE")
          echo "APK_PATH=$APK_ABS_PATH" >> $GITHUB_ENV
          echo "APK сохранен в переменную APK_PATH: $APK_ABS_PATH"
        else
          echo "✗ ОШИБКА: APK файл не найден ни в одном из мест!"
          echo "=== Диагностика ==="
          echo "Ищем во всех возможных местах:"
          find . -name "*.apk" -type f
          find $HOME/.buildozer -name "*.apk" -type f 2>/dev/null
          echo "Содержимое текущей директории:"
          ls -la
          echo "Содержимое папки bin/ (если существует):"
          ls -la bin/ 2>/dev/null || echo "bin/ не существует"
          echo "=== Последние строки лога buildozer ==="
          tail -50 /tmp/buildozer.log || echo "Лог недоступен"
          echo "=== Код выхода buildozer: $BUILD_RESULT ==="
          echo "=== Проверка наличия ошибок в логе ==="
          if grep -qi "failed\|error" /tmp/buildozer.log; then
            echo "Найдены ошибки в логе:"
            grep -i "failed\|error" /tmp/buildozer.log | tail -10
          fi
          # Если buildozer завершился с ошибкой, не считаем это критичным, если APK не найден
          # Но все равно выходим с ошибкой
          exit 1
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: ${{ env.APK_PATH }}
        if-no-files-found: error
        retention-days: 30
