name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip git unzip openjdk-17-jdk build-essential libssl-dev libffi-dev python3-dev
        # Проверяем, что git установлен
        git --version
    
    - name: Install Python dependencies
      run: |
        pip3 install --user buildozer cython
        export PATH="$HOME/.local/bin:$PATH"
        # Проверяем, что buildozer установлен
        buildozer --version
    
    - name: Initialize Buildozer and Android SDK
      working-directory: ./ready_app
      run: |
        export PATH="$HOME/.local/bin:/usr/bin:/usr/local/bin:$PATH"
        # Проверяем наличие git
        which git || (echo "Git not found!" && exit 1)
        git --version
        
        # Сначала создаем структуру SDK и принимаем лицензии
        SDK_PATH="$HOME/.buildozer/android/platform/android-sdk"
        mkdir -p "$SDK_PATH/licenses"
        
        # Принимаем все лицензии автоматически (до установки SDK)
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$SDK_PATH/licenses/android-sdk-license"
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$SDK_PATH/licenses/android-sdk-preview-license"
        echo "8403addf88ab4874007e1c1e80a0025de2550a16" > "$SDK_PATH/licenses/android-googletv-license"
        echo "601085b94cd77f0b54ff86406957099ebe79c4d6" > "$SDK_PATH/licenses/android-sdk-arm-dbt-license"
        echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > "$SDK_PATH/licenses/google-gdk-license"
        echo "d975f751698a77b662f1254ddbeed3901e976f5a" > "$SDK_PATH/licenses/intel-android-extra-license"
        echo "e9acab5e5f1efb7a6c54c6850d6c4c78afd05907" > "$SDK_PATH/licenses/mips-android-sysimage-license"
        echo "d56f5187479452e8b6f6e7e3c4c8b1c2d3e4f5a6b" > "$SDK_PATH/licenses/android-sdk-license-5"
        echo "601991b4f3c23035e0c25ecdbb92b3d1c4e5f6a7b" > "$SDK_PATH/licenses/android-sdk-license-6"
        
        # Инициализируем buildozer (скачает Android SDK автоматически)
        # Это скачает базовый SDK, но может не установить cmdline-tools
        buildozer android update || echo "Buildozer update завершился с предупреждениями, продолжаем..."
        
        # Если SDK уже существует, устанавливаем cmdline-tools вручную
        if [ -d "$SDK_PATH" ] && [ ! -d "$SDK_PATH/cmdline-tools" ]; then
          echo "Устанавливаем cmdline-tools вручную..."
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip || \
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip || \
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          if [ -f commandlinetools-*.zip ]; then
            unzip -q commandlinetools-*.zip -d "$SDK_PATH"
            mkdir -p "$SDK_PATH/cmdline-tools"
            mv "$SDK_PATH/cmdline-tools" "$SDK_PATH/cmdline-tools-tmp" 2>/dev/null || true
            mv "$SDK_PATH/cmdline-tools-tmp"/* "$SDK_PATH/cmdline-tools/latest" 2>/dev/null || true
            rm -f commandlinetools-*.zip
          fi
        fi
        
        # Исправляем путь к sdkmanager для buildozer
        # Buildozer ищет sdkmanager в tools/bin/, но в новых версиях он в cmdline-tools/latest/bin/
        if [ -d "$SDK_PATH" ]; then
          # Создаем структуру tools/bin если её нет
          mkdir -p "$SDK_PATH/tools/bin"
          
          # Если cmdline-tools установлены, создаем симлинк
          if [ -f "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "Создаем симлинк для sdkmanager..."
            ln -sf "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" "$SDK_PATH/tools/bin/sdkmanager" || true
            ln -sf "$SDK_PATH/cmdline-tools/latest/bin/avdmanager" "$SDK_PATH/tools/bin/avdmanager" || true
            # Копируем также другие инструменты
            if [ -d "$SDK_PATH/cmdline-tools/latest/lib" ]; then
              cp -r "$SDK_PATH/cmdline-tools/latest/lib" "$SDK_PATH/tools/" 2>/dev/null || true
            fi
          fi
          
          # Проверяем, что sdkmanager доступен
          if [ -f "$SDK_PATH/tools/bin/sdkmanager" ] || [ -f "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "sdkmanager найден"
          else
            echo "ОШИБКА: sdkmanager не найден ни в одном из путей!"
            echo "Содержимое SDK:"
            ls -la "$SDK_PATH" || true
            exit 1
          fi
        fi
        
        # Устанавливаем необходимые компоненты Android SDK
        if [ -d "$SDK_PATH" ]; then
          # Находим sdkmanager (приоритет: tools/bin для buildozer, затем cmdline-tools)
          SDKMANAGER=""
          if [ -f "$SDK_PATH/tools/bin/sdkmanager" ]; then
            SDKMANAGER="$SDK_PATH/tools/bin/sdkmanager"
          elif [ -f "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$SDK_PATH/cmdline-tools/latest/bin/sdkmanager"
          fi
          
          if [ -n "$SDKMANAGER" ]; then
            echo "Найден sdkmanager: $SDKMANAGER"
            
            # Устанавливаем стабильную версию build-tools (не rc)
            # Пробуем установить 34.0.0, если не получится - 33.0.0
            echo "Установка build-tools..."
            if $SDKMANAGER "build-tools;34.0.0" "platform-tools" "platforms;android-33"; then
              echo "Build-tools 34.0.0 установлены"
            elif $SDKMANAGER "build-tools;33.0.0" "platform-tools" "platforms;android-33"; then
              echo "Build-tools 33.0.0 установлены"
            elif $SDKMANAGER "build-tools;32.0.0" "platform-tools" "platforms;android-33"; then
              echo "Build-tools 32.0.0 установлены"
            else
              echo "ОШИБКА: Не удалось установить build-tools!"
              exit 1
            fi
            
            # Проверяем, что build-tools установлены
            if [ -d "$SDK_PATH/build-tools" ]; then
              echo "Build-tools установлены:"
              ls -la "$SDK_PATH/build-tools"
              # Проверяем наличие AIDL
              BUILD_TOOLS_DIR=$(ls -d "$SDK_PATH/build-tools"/* | head -1)
              if [ -f "$BUILD_TOOLS_DIR/aidl" ]; then
                echo "AIDL найден: $BUILD_TOOLS_DIR/aidl"
              else
                echo "ПРЕДУПРЕЖДЕНИЕ: AIDL не найден в $BUILD_TOOLS_DIR"
              fi
            else
              echo "ОШИБКА: Build-tools не установлены!"
              exit 1
            fi
          else
            echo "ОШИБКА: sdkmanager не найден!"
            exit 1
          fi
        else
          echo "ОШИБКА: Android SDK не найден!"
          exit 1
        fi
    
    - name: Build APK
      working-directory: ./ready_app
      run: |
        export PATH="$HOME/.local/bin:/usr/bin:/usr/local/bin:$PATH"
        # Проверяем, что все инструменты доступны
        which git
        which python3
        git --version
        
        # Проверяем, что build-tools установлены
        SDK_PATH="$HOME/.buildozer/android/platform/android-sdk"
        if [ -d "$SDK_PATH/build-tools" ]; then
          echo "Build-tools найдены:"
          ls -la "$SDK_PATH/build-tools"
          # Добавляем build-tools в PATH
          BUILD_TOOLS_DIR=$(ls -d "$SDK_PATH/build-tools"/* | head -1)
          export PATH="$BUILD_TOOLS_DIR:$PATH"
          echo "AIDL путь: $BUILD_TOOLS_DIR/aidl"
          [ -f "$BUILD_TOOLS_DIR/aidl" ] && echo "AIDL найден!" || echo "AIDL не найден!"
        else
          echo "ОШИБКА: Build-tools не найдены!"
          exit 1
        fi
        
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: ready_app/bin/*.apk
        retention-days: 30
