name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip git unzip openjdk-17-jdk build-essential libssl-dev libffi-dev python3-dev
        pip3 install --user buildozer cython
        export PATH="$HOME/.local/bin:$PATH"
    
    - name: Initialize Buildozer
      working-directory: ./ready_app
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        # Инициализируем buildozer и скачиваем Android SDK
        buildozer android update || true
        # Устанавливаем Android SDK компоненты
        yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0" "platform-tools" "platforms;android-33" || true
    
    - name: Build APK
      working-directory: ./ready_app
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: ready_app/bin/*.apk
        retention-days: 30
