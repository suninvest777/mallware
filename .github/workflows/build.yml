name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      PATH: ${{ env.PATH }}:$HOME/.local/bin:/usr/bin:/usr/local/bin
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip git unzip openjdk-17-jdk build-essential libssl-dev libffi-dev python3-dev
        # Проверяем, что git установлен
        git --version
    
    - name: Install Python dependencies
      run: |
        pip3 install --user buildozer cython
        export PATH="$HOME/.local/bin:$PATH"
        # Проверяем, что buildozer установлен
        buildozer --version
    
    - name: Initialize Buildozer and Android SDK
      working-directory: ./ready_app
      env:
        PATH: ${{ env.PATH }}:$HOME/.local/bin:/usr/bin:/usr/local/bin
      run: |
        export PATH="$HOME/.local/bin:/usr/bin:/usr/local/bin:$PATH"
        # Проверяем наличие git
        which git || (echo "Git not found!" && exit 1)
        git --version
        # Инициализируем buildozer (скачает Android SDK автоматически)
        buildozer android update
        
        # Устанавливаем необходимые компоненты Android SDK
        SDK_PATH="$HOME/.buildozer/android/platform/android-sdk"
        if [ -d "$SDK_PATH" ]; then
          # Устанавливаем build-tools через sdkmanager
          if [ -f "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" ]; then
            yes | $SDK_PATH/cmdline-tools/latest/bin/sdkmanager --licenses || true
            $SDK_PATH/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0" "platform-tools" "platforms;android-33" || true
          fi
        fi
    
    - name: Build APK
      working-directory: ./ready_app
      env:
        PATH: ${{ env.PATH }}:$HOME/.local/bin:/usr/bin:/usr/local/bin
      run: |
        export PATH="$HOME/.local/bin:/usr/bin:/usr/local/bin:$PATH"
        # Проверяем, что все инструменты доступны
        which git
        which python3
        git --version
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: ready_app/bin/*.apk
        retention-days: 30
